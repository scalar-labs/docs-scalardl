name: Restore site from tag

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Specify a restore point tag (e.g., restore-point-YYYY-MM-DD-HHMM)'
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  prepare-restore:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.resolve-tag.outputs.tag_name }}
      tag_date: ${{ steps.resolve-tag.outputs.tag_date }}
      previous_head: ${{ steps.resolve-tag.outputs.previous_head }}
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tag input
        id: resolve-tag
        run: |
          tag_name="${{ github.event.inputs.tag_name }}"

          # Verify tag exists
          if ! git rev-parse "refs/tags/$tag_name" >/dev/null 2>&1; then
            echo "Error: Tag '$tag_name' does not exist"
            exit 1
          fi

          # Get tag metadata
          tag_date=$(git tag -l --format='%(creatordate)' "$tag_name")
          previous_head=$(git rev-parse HEAD)

          echo "tag_name=$tag_name" >> $GITHUB_OUTPUT
          echo "tag_date=$tag_date" >> $GITHUB_OUTPUT
          echo "previous_head=$previous_head" >> $GITHUB_OUTPUT

          echo "✓ Tag validated: $tag_name"
          echo "  Date: $tag_date"

  restore-and-deploy:
    needs: prepare-restore
    runs-on: ubuntu-latest
    outputs:
      restoration_success: ${{ steps.deploy.outputs.success }}
      restored_tag: ${{ needs.prepare-restore.outputs.tag_name }}
      restored_timestamp: ${{ steps.deploy.outputs.timestamp }}
      previous_head: ${{ needs.prepare-restore.outputs.previous_head }}
      changes_count: ${{ steps.track-changes.outputs.changes_count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout specified tag
        run: |
          git checkout "${{ needs.prepare-restore.outputs.tag_name }}"
          echo "✓ Checked out tag: ${{ needs.prepare-restore.outputs.tag_name }}"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: python3 -m pip install --user gitingest

      - name: Install dependencies
        run: |
          npm ci
          echo "✓ Dependencies installed"

      - name: Build site
        run: |
          npm run build
          if [ ! -d "build" ]; then
            echo "Error: Build directory not created"
            exit 1
          fi
          echo "✓ Site built successfully"
          du -sh build/
          find build -type f | wc -l

      - name: Track changes
        id: track-changes
        run: |
          # Get list of changes between tag and previous HEAD
          previous_head="${{ needs.prepare-restore.outputs.previous_head }}"
          current_tag="${{ needs.prepare-restore.outputs.tag_name }}"

          # Generate change summary
          changes_summary="change-tracking-$(date +%s).md"

          cat > "$changes_summary" << 'EOF'
          # Change Tracking Report

          EOF

          echo "Generated on: $(date -u)" >> "$changes_summary"
          echo "Restoration Tag: $current_tag" >> "$changes_summary"
          echo "Previous HEAD: $previous_head" >> "$changes_summary"
          echo "" >> "$changes_summary"

          # Get file changes
          echo "## Files Changed Since Tag" >> "$changes_summary"
          echo "" >> "$changes_summary"

          # Added files
          added=$(git diff "$current_tag" "$previous_head" --diff-filter=A --name-only 2>/dev/null | wc -l)
          if [ "$added" -gt 0 ]; then
            echo "### Added ($added files)" >> "$changes_summary"
            git diff "$current_tag" "$previous_head" --diff-filter=A --name-only 2>/dev/null | sed 's/^/- /' >> "$changes_summary"
            echo "" >> "$changes_summary"
          fi

          # Modified files
          modified=$(git diff "$current_tag" "$previous_head" --diff-filter=M --name-only 2>/dev/null | wc -l)
          if [ "$modified" -gt 0 ]; then
            echo "### Modified ($modified files)" >> "$changes_summary"
            git diff "$current_tag" "$previous_head" --diff-filter=M --name-only 2>/dev/null | sed 's/^/- /' >> "$changes_summary"
            echo "" >> "$changes_summary"
          fi

          # Deleted files
          deleted=$(git diff "$current_tag" "$previous_head" --diff-filter=D --name-only 2>/dev/null | wc -l)
          if [ "$deleted" -gt 0 ]; then
            echo "### Deleted ($deleted files)" >> "$changes_summary"
            git diff "$current_tag" "$previous_head" --diff-filter=D --name-only 2>/dev/null | sed 's/^/- /' >> "$changes_summary"
            echo "" >> "$changes_summary"
          fi

          total_changes=$((added + modified + deleted))
          echo "## Summary" >> "$changes_summary"
          echo "Total changes: $total_changes" >> "$changes_summary"
          echo "" >> "$changes_summary"
          echo "## To Re-apply Changes" >> "$changes_summary"
          echo "" >> "$changes_summary"
          echo "After addressing the underlying issue, use one of these methods to re-apply changes:" >> "$changes_summary"
          echo "" >> "$changes_summary"
          echo "### Method 1: Cherry-pick specific commits" >> "$changes_summary"
          echo "\`\`\`bash" >> "$changes_summary"
          echo "git cherry-pick <commit-sha>" >> "$changes_summary"
          echo "\`\`\`" >> "$changes_summary"
          echo "" >> "$changes_summary"
          echo "### Method 2: Interactive rebase" >> "$changes_summary"
          echo "\`\`\`bash" >> "$changes_summary"
          echo "git rebase -i $current_tag" >> "$changes_summary"
          echo "\`\`\`" >> "$changes_summary"
          echo "" >> "$changes_summary"
          echo "### Method 3: Merge fixed branch" >> "$changes_summary"
          echo "\`\`\`bash" >> "$changes_summary"
          echo "git merge <fixed-branch>" >> "$changes_summary"
          echo "\`\`\`" >> "$changes_summary"

          mv "$changes_summary" build/

          echo "changes_count=$total_changes" >> $GITHUB_OUTPUT
          echo "✓ Change tracking complete: $total_changes changes identified"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: site-build
          path: build/
          retention-days: 30
          compression-level: 6

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/

      - name: Publish to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages

      - name: Output restoration summary
        run: |
          timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          echo "success=true" >> $GITHUB_OUTPUT
          echo "timestamp=$timestamp" >> $GITHUB_OUTPUT

  post-restoration:
    needs: [prepare-restore, restore-and-deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Output restoration details
        if: needs.prepare-restore.result == 'success' && needs.restore-and-deploy.result == 'success'
        run: |
          echo "## Site Restoration Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✓ **Restoration Successful**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Restored Tag | \`${{ needs.restore-and-deploy.outputs.restored_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Restoration Time | ${{ needs.restore-and-deploy.outputs.restored_timestamp }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Changes Reverted | ${{ needs.restore-and-deploy.outputs.changes_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Previous HEAD | \`${{ needs.restore-and-deploy.outputs.previous_head }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. **Verify site is accessible**: Visit the deployed site to confirm functionality" >> $GITHUB_STEP_SUMMARY
          echo "2. **Download change report**: Artifacts → \`site-build\` → \`change-tracking-*.md\`" >> $GITHUB_STEP_SUMMARY
          echo "3. **Identify root cause**: Investigate what caused the site issue" >> $GITHUB_STEP_SUMMARY
          echo "4. **Fix the issue**: Apply corrections to main branch" >> $GITHUB_STEP_SUMMARY
          echo "5. **Re-apply changes**: Use cherry-pick or rebase to re-apply the ${{ needs.restore-and-deploy.outputs.changes_count }} reverted changes" >> $GITHUB_STEP_SUMMARY
          echo "6. **Announce restoration**: Post message to #eng-documentation-feedback" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Announcement Template" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "🔄 **Site Restoration Complete**" >> $GITHUB_STEP_SUMMARY
          echo "Restored from tag: ${{ needs.restore-and-deploy.outputs.restored_tag }}"
          echo "Changes reverted: ${{ needs.restore-and-deploy.outputs.changes_count }}"
          echo "Time to restore: < 15 minutes" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Failure notification
        if: needs.prepare-restore.result != 'success' || needs.restore-and-deploy.result != 'success'
        run: |
          echo "## Restoration Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "❌ **Restoration encountered errors**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Troubleshooting:" >> $GITHUB_STEP_SUMMARY
          echo "1. Check workflow logs for specific error messages" >> $GITHUB_STEP_SUMMARY
          echo "2. Verify tag \`${{ github.event.inputs.tag_name }}\` exists and is valid" >> $GITHUB_STEP_SUMMARY
          echo "3. Verify tag points to a working commit that builds successfully" >> $GITHUB_STEP_SUMMARY
          echo "4. Try restoring from an earlier tag if current tag build is broken" >> $GITHUB_STEP_SUMMARY
          echo "5. Check GitHub Pages deployment settings" >> $GITHUB_STEP_SUMMARY
          echo "6. Review build logs for dependency or build errors" >> $GITHUB_STEP_SUMMARY
          exit 1
